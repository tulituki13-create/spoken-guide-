name: Build and Commit Dist

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build Frontend & Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build project
        run: npm run build

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit and Push dist folder
        run: |
          # The dist directory contains both the frontend assets and backend server.cjs
          if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            git add -f dist
            if git diff --cached --quiet; then
              echo "No changes in dist folder, skipping commit."
            else
              git commit -m "build: automatic production compile [skip ci]"
              git push origin HEAD:${{ github.ref }}
            fi
          else
            echo "Error: dist directory is missing or empty!"
            exit 1
          fi
